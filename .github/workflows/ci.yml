name: CI

on:
  push:
    branches: 
      - master

jobs:
  build:
    name: 'Build and Push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [14, 16, 18]

    steps:
        - uses: actions/checkout@v4

        - name: Setup node | ${{ matrix.node }}
          uses: actions/setup-node@v6
          with:
            node-version: ${{ matrix.node }}
            cache: 'npm'

        - run: npm install
        - run: npm run test 
