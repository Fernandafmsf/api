name: CI

on:
  push:
    branches: 
      - master

jobs:
  build:
    name: 'Build and Push'
    runs-on: ubuntu-latest
    # strategy:
    #   matrix:
    #     node: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup node | ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - run: npm install
      - run: npm run test 

      - name: Build Docker Image
        run: docker build -t rocketseat-ci-api:latest . ## vai buildar a imagem com a tag latest

